<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#21262d;

body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:16px}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;color:var(--acc)}
header span{color:var(--txt2);font-size:.8rem}
.tag{background:rgba(0,212,255,.12);color:var(--acc);border:1px solid rgba(0,212,255,.2);font-size:.65rem;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace}

.wrap{display:flex;flex:1;overflow:hidden;height:calc(100vh - 50px)}

/* LEFT PANEL */
.left{width:280px;min-width:240px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.section{padding:12px 14px;border-bottom:1px solid var(--bdr)}
.section-title{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:var(--txt2);text-transform:uppercase;margin-bottom:8px}

/* Animal buttons */

.ab{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.75rem;display:flex;align-items:center;gap:4px;transition:all .15s;font-family:'Space Grotesk',sans-serif;color:var(--txt2)}
.ab:hover{border-color:var(--acc);color:var(--acc)}
.ab.on{background:rgba(0,212,255,.12);border-color:var(--acc);color:var(--acc)}

select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:6px 8px;color:var(--txt);font-size:.8rem;font-family:'Space Grotesk',sans-serif;cursor:pointer}

.tb::-webkit-scrollbar{width:4px}
.tb::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
table{width:100%;border-collapse:collapse;font-size:.75rem}
table th{background:var(--bg3);padding:6px 8px;text-align:left;font-size:.6rem;letter-spacing:.08em;color:var(--txt2);text-transform:uppercase;position:sticky;top:0;z-index:1}

// ─────────────────────────────────────────────────────────────────
// SPLINE CÚBICO NATURAL
// ─────────────────────────────────────────────────────────────────
function cubicSplineNatural(xs, ys) {
  const n = xs.length - 1;
  if (n < 1) return () => ys[0];

  const h = [], alpha = [], l = [1], mu = [0], z = [0];
  for (let i = 0; i < n; i++) h[i] = xs[i + 1] - xs[i];
  for (let i = 1; i < n; i++)
    alpha[i] = (3 / h[i]) * (ys[i + 1] - ys[i]) - (3 / h[i - 1]) * (ys[i] - ys[i - 1]);

  for (let i = 1; i < n; i++) {
    l[i] = 2 * (xs[i + 1] - xs[i - 1]) - h[i - 1] * mu[i - 1];
    mu[i] = h[i] / l[i];
    z[i] = (alpha[i] - h[i - 1] * z[i - 1]) / l[i];
  }
  l[n] = 1; z[n] = 0;

  const c = Array(n + 1).fill(0), b = [], d = [];
  for (let j = n - 1; j >= 0; j--) {
    c[j] = z[j] - mu[j] * c[j + 1];
    b[j] = (ys[j + 1] - ys[j]) / h[j] - h[j] * (c[j + 1] + 2 * c[j]) / 3;
    d[j] = (c[j + 1] - c[j]) / (3 * h[j]);
  }

  return (x) => {
    let i = n - 1;
    for (let j = 0; j < n; j++) { if (x <= xs[j + 1]) { i = j; break; } }
    const dx = x - xs[i];
    return ys[i] + b[i] * dx + c[i] * dx * dx + d[i] * dx * dx * dx;
  };
}

// ─────────────────────────────────────────────────────────────────
// MODIFICACIÓN MATEMÁTICA 1: INTERPOLACIÓN POR LONGITUD DE ARCO
// ─────────────────────────────────────────────────────────────────
function interpParametric(xCtrl, yCtrl, nPts = 300) {
  const N = xCtrl.length;
  const t = [0]; // Se calcula la distancia real (Longitud de Arco)
  for (let i = 1; i < N; i++) {
    t.push(t[i - 1] + Math.hypot(xCtrl[i] - xCtrl[i - 1], yCtrl[i] - yCtrl[i - 1]));
  }
  const totalL = t[N - 1];
  const tt = [];
  for (let i = 0; i < nPts; i++) tt.push((i / (nPts - 1)) * totalL);

  const sx = cubicSplineNatural(t, xCtrl);
  const sy = cubicSplineNatural(t, yCtrl);
  return { x: tt.map(v => sx(v)), y: tt.map(v => sy(v)), totalLen: totalL };
}

function readCtrl() {
  const rows = document.querySelectorAll('#ptB tr');
  const x = [], y = [];

    const inp = r.querySelectorAll('input');
    if (inp.length >= 2) { x.push(+inp[0].value || 0); y.push(+inp[1].value || 0); }
  });
  return { x, y };
}

function fillCtrl(d) {
  const tb = document.getElementById('ptB');
  tb.innerHTML = '';

    tr.innerHTML = `<td class="lb" title="${lbl}">${lbl}</td>

      <td><input type="number" step="0.01" value="${d.y[i].toFixed(2)}"></td>`;
    tb.appendChild(tr);
  });
  document.getElementById('nPts').textContent = d.x.length + ' pts';
}

function initAnimalButtons() {
  const cont = document.getElementById('animalBtns');

    b.innerHTML = `${v.e} <span>${v.n.split('(')[0].trim()}</span>`;
    b.onclick = () => loadAnimal(k);
    cont.appendChild(b);
  });

function loadAnimal(k) {
  curAnimal = k;
  document.querySelectorAll('.ab').forEach(b => b.classList.remove('on'));
  document.querySelector(`[data-a="${k}"]`)?.classList.add('on');

  const parts = Object.keys(DATA[k].parts);
  const sel = document.getElementById('partSel');
  sel.innerHTML = parts.map((p, i) => `<option value="${p}"${i ? '' : ' selected'}>${p}</option>`).join('');

  document.getElementById('srcBadge').textContent = 'Fuente: ' + (DATA[k].src || '—');
  loadPart(parts[0]);
}

function loadPart(p) {
  curPart = p;
  const d = DATA[curAnimal]?.parts[p];
  if (!d) return;
  fillCtrl(d);
  const an = DATA[curAnimal];
  document.getElementById('curLbl').innerHTML =
    `<strong>${an.e} ${an.n}</strong> — ${p}`;
  updateCode();
  gen();
}

// ─────────────────────────────────────────────────────────────────
// MODIFICACIÓN MATEMÁTICA 2: GENERACIÓN DE GRÁFICA CON NORMALES
// ─────────────────────────────────────────────────────────────────
function gen() {
  const c = readCtrl();
  if (c.x.length < 3) { toast('⚠ Mínimo 3 puntos de control'); return; }

  const cv = interpParametric(c.x, c.y, 300);
  const part = DATA[curAnimal]?.parts[curPart];
  const isWing = part?.isWing || false;
  const isTail = part?.isTail || false;
  const isFoot = part?.isFoot || false;
  const labels = part?.labels || c.x.map((_, i) => 'P' + i);

  // CÁLCULO DE VECTORES NORMALES (Perpendiculares a la curva)
  const N = cv.x.length;
  const nx = [], ny = [];
  for (let i = 0; i < N; i++) {
    let prev = Math.max(0, i - 1), next = Math.min(N - 1, i + 1);
    let dx = cv.x[next] - cv.x[prev];
    let dy = cv.y[next] - cv.y[prev];
    let len = Math.hypot(dx, dy);
    if (len === 0) { dx = 0; dy = 1; len = 1; }
    nx.push(-dy / len);
    ny.push(dx / len);
  }

  let traces = [];

  if (isWing) {
    // Ala / aleta: offset perpendicular para que no se "aplaste" en las caídas
    const thick = Math.max(0.3, cv.totalLen * 0.05);
    const xUp = cv.x.map((x, i) => x + nx[i] * thick);
    const yUp = cv.y.map((y, i) => y + ny[i] * thick);
    const xDn = cv.x.map((x, i) => x - nx[i] * thick);
    const yDn = cv.y.map((y, i) => y - ny[i] * thick);

    traces = [
      {
        x: xUp.concat([...xDn].reverse()),
        y: yUp.concat([...yDn].reverse()),
        fill: 'toself', fillcolor: 'rgba(0,212,255,0.07)',
        line: { color: 'rgba(0,212,255,0.15)', width: 1 }, name: 'Sección ósea'
      },
      { x: cv.x, y: cv.y, mode: 'lines', name: 'Eje óseo (spline)', line: { color: '#00d4ff', width: 3 } },
      { x: xUp, y: yUp, mode: 'lines', name: 'Borde sup', line: { color: '#22c55e', width: 1.2, dash: 'dash' } },
      { x: xDn, y: yDn, mode: 'lines', name: 'Borde inf', line: { color: '#f59e0b', width: 1.2, dash: 'dash' } },
      {
        x: c.x, y: c.y, mode: 'markers+text', name: 'Articulaciones',
        marker: { color: '#ef4444', size: 11, symbol: 'diamond', line: { color: '#fff', width: 1.5 } },
        text: labels, textposition: 'top center',
        textfont: { size: 9, color: '#f59e0b', family: 'JetBrains Mono' }
      }
    ];
  } else if (isTail) {
    // Cola: curva libre sin espejo
    traces = [
      { x: cv.x, y: cv.y, mode: 'lines', name: 'Eje cola (spline)', line: { color: '#a78bfa', width: 3 } },
      {
        x: c.x, y: c.y, mode: 'markers+text', name: 'Vértebras',
        marker: { color: '#f59e0b', size: 9, symbol: 'circle', line: { color: '#fff', width: 1 } },
        text: labels, textposition: 'top right',
        textfont: { size: 8, color: '#c084fc', family: 'JetBrains Mono' }
      }
    ];
  } else if (isFoot) {
    // Pie: perfil inferior (contacto suelo)
    const yFloor = Math.min(...cv.y);
    traces = [
      {
        x: cv.x.concat([cv.x[cv.x.length - 1], cv.x[0]]),
        y: cv.y.concat([yFloor, yFloor]),
        fill: 'toself', fillcolor: 'rgba(34,197,94,0.07)',
        line: { color: 'rgba(34,197,94,0.2)', width: 1 }, name: 'Perfil pie'
      },
      { x: cv.x, y: cv.y, mode: 'lines', name: 'Arco plantar (spline)', line: { color: '#22c55e', width: 3 } },
      {
        x: c.x, y: c.y, mode: 'markers+text', name: 'Control',
        marker: { color: '#ef4444', size: 10, symbol: 'diamond', line: { color: '#fff', width: 1.5 } },
        text: labels, textposition: 'top center',
        textfont: { size: 9, color: '#f59e0b', family: 'JetBrains Mono' }
      }
    ];
  } else {
    // MIEMBRO: Reemplazado "-x" (espejo roto) por Offset Normal (perfil anatómico)
    const Lx = [], Ly = [], Rx = [], Ry = [];
    const baseThick = cv.totalLen * 0.12; 
    for (let i = 0; i < N; i++) {
        let t_norm = i / (N - 1);
        let profile = (1 - t_norm) * 1.0 + t_norm * 0.3 + Math.sin(t_norm * Math.PI) * 0.25;
        let r = baseThick * profile;
        Lx.push(cv.x[i] + nx[i] * r); Ly.push(cv.y[i] + ny[i] * r);
        Rx.push(cv.x[i] - nx[i] * r); Ry.push(cv.y[i] - ny[i] * r);
    }
    
    traces = [
      {
        x: Lx.concat([...Rx].reverse()),
        y: Ly.concat([...Ry].reverse()),
        fill: 'toself', fillcolor: 'rgba(0,212,255,0.06)',
        line: { color: 'rgba(0,212,255,0.15)', width: 1 }, name: 'Silueta prótesis'
      },
      { x: cv.x, y: cv.y, mode: 'lines', name: 'Perfil (spline)', line: { color: '#00d4ff', width: 3 } },
      { x: Lx, y: Ly, mode: 'lines', name: 'Contorno', line: { color: '#8b5cf6', width: 2, dash: 'dot' } },
      { x: Rx, y: Ry, mode: 'lines', showlegend: false, line: { color: '#8b5cf6', width: 2, dash: 'dot' } },
      {
        x: c.x, y: c.y, mode: 'markers+text', name: 'Articulaciones',
        marker: { color: '#ef4444', size: 10, symbol: 'diamond', line: { color: '#fff', width: 1.5 } },
        text: labels, textposition: 'top right',
        textfont: { size: 9, color: '#f59e0b', family: 'JetBrains Mono' }
      }
    ];
  }

  const an = DATA[curAnimal];
  Plotly.react('chart', traces, {
    paper_bgcolor: '#0d1117', plot_bgcolor: '#0a0f1e',
    font: { family: 'Space Grotesk', color: '#e2e8f0' },
    title: {
      text: `${an.e} ${an.n.split('(')[0].trim()} — ${curPart} — Spline Cúbico Natural`,
      font: { size: 13, color: '#e2e8f0' }
    },
    xaxis: { title: 'x [cm]', gridcolor: 'rgba(255,255,255,0.04)', zerolinecolor: 'rgba(0,212,255,0.15)', color: '#8b949e' },
    yaxis: { title: 'y [cm]', gridcolor: 'rgba(255,255,255,0.04)', scaleanchor: 'x', color: '#8b949e' },
    margin: { t: 48, r: 16, b: 50, l: 50 },
    legend: {
      x: .01, y: .99, bgcolor: 'rgba(13,17,23,.92)',
      bordercolor: 'rgba(255,255,255,.06)', borderwidth: 1, font: { size: 10 }
    }
  }, { responsive: true });

  document.getElementById('nfo').textContent =
    `${c.x.length} pts control | 300 pts interpolados | Longitud de arco | Offset Normal perpendicular`;
}

// ─────────────────────────────────────────────────────────────────
// MODIFICACIÓN MATEMÁTICA 3: GENERACIÓN DE CÓDIGO ACTUALIZADO
// ─────────────────────────────────────────────────────────────────
function updateCode() {
  const d = DATA[curAnimal]?.parts[curPart];
  if (!d) return;

  const xS = d.x.map(v => v.toFixed(3)).join(', ');
  const yS = d.y.map(v => v.toFixed(3)).join(', ');
  const lblS = (d.labels || d.x.map((_, i) => 'P' + i)).map(l => `'${l}'`).join(', ');
  const an = DATA[curAnimal];
  const isWing = d.isWing || false;
  const isTail = d.isTail || false;
  const title = `${an.n} — ${curPart}`;

  // ── PYTHON ──────────────
  window._py = `# ${title}
# Spline Cúbico Natural con Longitud de Arco y Vectores Normales
# Fuente datos: ${an.src || 'medidas veterinarias'}
# Requiere: numpy, scipy, matplotlib

import numpy as np
from scipy.interpolate import CubicSpline
import matplotlib.pyplot as plt

# Puntos de control (cm) — medidas anatómicas reales
x_ctrl = np.array([${xS}])
y_ctrl = np.array([${yS}])
labels = [${lblS}]

# 1. Parametrización por longitud de arco
dists = np.hypot(np.diff(x_ctrl), np.diff(y_ctrl))
t = np.insert(np.cumsum(dists), 0, 0)
tt = np.linspace(0, t[-1], 300)
total_len = t[-1]

# Spline cúbico natural
cs_x = CubicSpline(t, x_ctrl, bc_type='natural')
cs_y = CubicSpline(t, y_ctrl, bc_type='natural')
xs, ys = cs_x(tt), cs_y(tt)

# 2. Vectores Normales
dx, dy = np.gradient(xs), np.gradient(ys)
length = np.hypot(dx, dy)
length[length == 0] = 1 # Evitar div por cero
nx, ny = -dy / length, dx / length

fig, ax = plt.subplots(figsize=(10, 8))
fig.patch.set_facecolor('#0d1117')
ax.set_facecolor('#0a0f1e')
ax.tick_params(colors='#8b949e'); ax.xaxis.label.set_color('#8b949e'); ax.yaxis.label.set_color('#8b949e')
for spine in ax.spines.values(): spine.set_edgecolor('#30363d')

${isWing ? `# Ala: eje óseo + bordes perpendiculares
thick = max(0.3, total_len * 0.05)
xUp, yUp = xs + nx * thick, ys + ny * thick
xDn, yDn = xs - nx * thick, ys - ny * thick

ax.fill(np.concatenate([xUp, xDn[::-1]]), np.concatenate([yUp, yDn[::-1]]), alpha=0.07, color='cyan', label='Sección ósea')
ax.plot(xs, ys, color='#00d4ff', lw=2.5, label='Eje óseo (spline)')
ax.plot(xUp, yUp, color='#22c55e', lw=1, ls='--', label='Borde superior')
ax.plot(xDn, yDn, color='#f59e0b', lw=1, ls='--', label='Borde inferior')` :
isTail ? `# Cola: curva libre
ax.plot(xs, ys, color='#a78bfa', lw=2.5, label='Eje cola (spline)')` :
`# Perfil + Contorno Anatómico
base_thick = total_len * 0.12
t_norm = np.linspace(0, 1, len(xs))
profile = (1 - t_norm) * 1.0 + t_norm * 0.3 + np.sin(t_norm * np.pi) * 0.25
r = base_thick * profile

Lx, Ly = xs + nx * r, ys + ny * r
Rx, Ry = xs - nx * r, ys - ny * r

ax.fill(np.concatenate([Lx, Rx[::-1]]), np.concatenate([Ly, Ry[::-1]]), alpha=0.06, color='cyan', label='Silueta prótesis')
ax.plot(xs, ys, color='#00d4ff', lw=2.5, label='Perfil (spline)')
ax.plot(Lx, Ly, color='#8b5cf6', lw=2, ls=':', label='Contorno')
ax.plot(Rx, Ry, color='#8b5cf6', lw=2, ls=':')`}

# Puntos de control con etiquetas
ax.scatter(x_ctrl, y_ctrl, c='#ef4444', s=90, zorder=5, marker='D', label='Articulaciones')
for i, (xi, yi, lbl) in enumerate(zip(x_ctrl, y_ctrl, labels)):
    ax.annotate(lbl, (xi, yi), xytext=(6, 6), textcoords='offset points',
                fontsize=7.5, color='#f59e0b', fontfamily='monospace')

ax.set_title('${title}', color='#e2e8f0', pad=12)
ax.set_xlabel('x [cm]'); ax.set_ylabel('y [cm]')
ax.set_aspect('equal'); ax.grid(True, alpha=0.08, color='#30363d')
ax.legend(facecolor='#161b22', edgecolor='#30363d', labelcolor='#e2e8f0', fontsize=9)
plt.tight_layout()
plt.show()
`;

  // ── OCTAVE / MATLAB ─────────────────────────────────────────────
  window._oct = `% ${title}
% Spline Cúbico Natural con Longitud de Arco y Vectores Normales
% Fuente datos: ${an.src || 'medidas veterinarias'}

x_ctrl = [${xS}];
y_ctrl = [${yS}];
labels = {${lblS}};

% 1. Parametrizacion por longitud de arco
t = [0, cumsum(hypot(diff(x_ctrl), diff(y_ctrl)))];
tt = linspace(0, t(end), 300);
total_len = t(end);

xs = spline_natural_eval(t, x_ctrl, tt);
ys = spline_natural_eval(t, y_ctrl, tt);

% 2. Vectores Normales
dx = gradient(xs); dy = gradient(ys);
len = hypot(dx, dy);
len(len == 0) = 1; % Evitar div por cero
nx = -dy ./ len; ny = dx ./ len;

figure('Color', [0.05 0.067 0.09]);
ax = axes('Color', [0.04 0.059 0.075]);
hold on;

${isWing ? `% Ala: eje óseo + bordes perpendiculares
thick = max(0.3, total_len * 0.05);
xUp = xs + nx .* thick; yUp = ys + ny .* thick;
xDn = xs - nx .* thick; yDn = ys - ny .* thick;

fill([xUp fliplr(xDn)], [yUp fliplr(yDn)], 'c', 'FaceAlpha', 0.07, 'EdgeColor', 'none');
plot(xs, ys, 'Color', [0 .83 1], 'LineWidth', 2.5, 'DisplayName', 'Eje oseo (spline)');
plot(xUp, yUp, 'Color', [.13 .77 .37], 'LineStyle', '--', 'LineWidth', 1, 'DisplayName', 'Borde sup');
plot(xDn, yDn, 'Color', [.96 .62 .04], 'LineStyle', '--', 'LineWidth', 1, 'DisplayName', 'Borde inf');` :
isTail ? `% Cola: curva libre
plot(xs, ys, 'Color', [.66 .54 .99], 'LineWidth', 2.5, 'DisplayName', 'Eje cola (spline)');` :
`% Perfil + Contorno Anatómico
base_thick = total_len * 0.12;
t_norm = linspace(0, 1, length(xs));
profile = (1 - t_norm) * 1.0 + t_norm * 0.3 + sin(t_norm * pi) * 0.25;
r = base_thick .* profile;

Lx = xs + nx .* r; Ly = ys + ny .* r;
Rx = xs - nx .* r; Ry = ys - ny .* r;

fill([Lx fliplr(Rx)], [Ly fliplr(Ry)], 'c', 'FaceAlpha', 0.06, 'EdgeColor', 'none');
plot(xs, ys, 'Color', [0 .83 1], 'LineWidth', 2.5, 'DisplayName', 'Perfil (spline)');
plot(Lx, Ly, 'Color', [.55 .36 .97], 'LineStyle', ':', 'LineWidth', 2, 'DisplayName', 'Contorno');
plot(Rx, Ry, 'Color', [.55 .36 .97], 'LineStyle', ':', 'LineWidth', 2, 'HandleVisibility','off');`}

% Puntos de control
scatter(x_ctrl, y_ctrl, 90, [.94 .27 .27], 'filled', 'd', 'DisplayName', 'Articulaciones');
for i = 1:length(x_ctrl)
    text(x_ctrl(i)+0.2, y_ctrl(i)+0.2, labels{i}, ...
         'Color', [.96 .62 .04], 'FontSize', 7, 'FontName', 'Courier');
end

title('${title}', 'Color', 'white');
xlabel('x [cm]', 'Color', [.55 .58 .62]);
ylabel('y [cm]', 'Color', [.55 .58 .62]);
axis equal; grid on;
legend('show', 'TextColor', 'white', 'Color', [0.09 0.1 0.13]);

% ─ Función auxiliar (spline natural) ─────────────────────────────
function yy = spline_natural_eval(x, y, xx)
  n = length(x) - 1;
  h = diff(x);
  A = zeros(n+1, n+1); rhs = zeros(n+1, 1);
  A(1,1) = 1;  A(end,end) = 1;
  for i = 2:n
    A(i,i-1) = h(i-1); A(i,i) = 2*(h(i-1)+h(i)); A(i,i+1) = h(i);
    rhs(i) = 3*((y(i+1)-y(i))/h(i) - (y(i)-y(i-1))/h(i-1));
  end
  c = A \\ rhs; b = zeros(n,1); d = zeros(n,1);
  for i = 1:n
    b(i) = (y(i+1)-y(i))/h(i) - h(i)*(2*c(i)+c(i+1))/3;
    d(i) = (c(i+1)-c(i))/(3*h(i));
  end
  yy = zeros(size(xx));
  for k = 1:length(xx)
    seg = n;
    for j = 1:n-1
      if xx(k) <= x(j+1); seg = j; break; end
    end
    dx = xx(k) - x(seg);
    yy(k) = y(seg) + b(seg)*dx + c(seg)*dx^2 + d(seg)*dx^3;
  end
end
`;

  document.getElementById('editor').value = cLang === 'py' ? window._py : window._oct;
}

// ─────────────────────────────────────────────────────────────────
// EJECUTAR CÓDIGO Y EVENTOS DE INTERFAZ (Sin modificaciones)
// ─────────────────────────────────────────────────────────────────
function runCode() {
  const code = document.getElementById('editor').value;
  const arrayRe = /(\w+)\s*=\s*(?:np\.array\s*\(\s*)?\[([^\]]+)\]/g;
  const all = [...code.matchAll(arrayRe)];
  const arrs = all
    .map(m => ({ name: m[1], vals: m[2].split(/[\s,;]+/).filter(s => s && s !== '...').map(Number).filter(v => !isNaN(v)) }))
    .filter(a => a.vals.length >= 3);

  if (arrs.length < 2) { toast('⚠ Necesito al menos 2 arrays numéricos con ≥3 valores (x_ctrl, y_ctrl)'); return; }
  const xArr = arrs.find(a => a.name.includes('x')) || arrs[0];
  const yArr = arrs.find(a => a.name.includes('y') && a !== xArr) || arrs[1];
  if (xArr.vals.length !== yArr.vals.length) { toast(`⚠ Arrays de distinto largo: ${xArr.name}(${xArr.vals.length}) vs ${yArr.name}(${yArr.vals.length})`); return; }

  fillCtrl({ x: xArr.vals, y: yArr.vals });
  gen();
  toast(`✓ ${xArr.name}[${xArr.vals.length}] + ${yArr.name}[${yArr.vals.length}] → graficado`);
}

function copyCode() {
  const txt = document.getElementById('editor').value;
  navigator.clipboard.writeText(txt).then(() => toast('✓ Código copiado al portapapeles'));
}

function setCodeTab(t) {
  cLang = t;
  document.querySelectorAll('.ct button').forEach(b => b.classList.remove('on'));
  document.querySelector(`[data-ct="${t}"]`).classList.add('on');
  document.getElementById('editor').value = t === 'py' ? window._py : window._oct;
}

function addPt() {
  const tb = document.getElementById('ptB');
  const n = tb.rows.length;
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="lb">P${n}</td>
    <td><input type="number" step="0.01" value="0.00"></td>
    <td><input type="number" step="0.01" value="0.00"></td>`;
  tb.appendChild(tr);
  document.getElementById('nPts').textContent = (n + 1) + ' pts';
}

function rmPt() {
  const tb = document.getElementById('ptB');
  if (tb.rows.length > 3) {
    tb.deleteRow(tb.rows.length - 1);
    document.getElementById('nPts').textContent = tb.rows.length + ' pts';
  } else toast('⚠ Mínimo 3 puntos');
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 3500);
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initAnimalButtons();
  loadAnimal('gato');

  // Auto-redibujar al cambiar inputs
  document.addEventListener('input', e => {
    if (e.target.closest('.tb')) {
      clearTimeout(window._debounce);
      window._debounce = setTimeout(() => { gen(); updateCode(); }, 400);
    }
  });

  document.getElementById('partSel').addEventListener('change', e => loadPart(e.target.value));
});
</script>
